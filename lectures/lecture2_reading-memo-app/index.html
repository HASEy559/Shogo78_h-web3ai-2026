<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>読書メモ</title>
    <!-- シンプルな大人向けフォント（Inter と Noto Sans JP）を読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ログイン画面 -->
    <div id="login-screen" class="container">
        <h1 class="login-title">読書メモ</h1>
        <p class="login-desc">ユーザ名を入力してください</p>
        <form id="login-form">
            <div class="form-group">
                <input type="text" id="username" required placeholder="ユーザ名（例: 太郎）">
            </div>
            <button type="submit" id="login-button">ログイン</button>
        </form>
    </div>

    <!-- メインアプリ画面（初期状態は非表示） -->
    <div id="app-screen" class="container" style="display: none;">
        <div class="app-header">
            <h1>読書メモ</h1>
            <div class="user-info">
                <span><span id="display-username" class="user-name-text"></span> さん</span>
                <button id="logout-button" class="action-btn logout">ログアウト</button>
            </div>
        </div>

        <!-- ランダム振り返りエリア -->
        <div class="random-memos-section">
            <div class="section-header">
                <h2>今日の振り返り</h2>
                <button id="skip-button" class="skip-button">別のメモ</button>
            </div>
            <div id="random-memos" class="card-container">
                <!-- ここにJavaScriptでランダムな2件がカード形式で表示されます -->
            </div>
        </div>
        
        <!-- 登録フォーム -->
        <form id="memo-form">
            <div class="form-group">
                <label for="book-title">本のタイトル</label>
                <input type="text" id="book-title" required placeholder="例: 星の王子さま">
            </div>
            <div class="form-group">
                <label for="book-memo">一言メモ</label>
                <textarea id="book-memo" required placeholder="例: 大切なものは目に見えない。"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" id="submit-button">保存する</button>
                <button type="button" id="cancel-edit-button" style="display: none;">キャンセル</button>
            </div>
        </form>

        <!-- メモ一覧表示エリア -->
        <div class="memo-list-section">
            <div class="section-header">
                <h2>保存したメモ</h2>
            </div>
            <ul id="memo-list">
                <!-- ここにJavaScriptでメモが追加されます -->
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
